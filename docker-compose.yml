services:
  api:
    build: ./server
    container_name: nest-ledger-api
    ports:
      - "8000:8000"
    environment:
      - MONGODB_URL=mongodb://nestapp:N3stLedgerApp2026@mongo:27017/nest_ledger?authSource=nest_ledger
      - MONGODB_DB_NAME=nest_ledger
      - JWT_SECRET=${JWT_SECRET}
      - WECHAT_APPID=${WECHAT_APPID}
      - WECHAT_SECRET=${WECHAT_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: nest-ledger-mongo
    command: --auth
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "-u", "admin", "-p", "N3stLedgerAdmin2026", "--authenticationDatabase", "admin", "--eval", "db.runCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  mongo_data:
